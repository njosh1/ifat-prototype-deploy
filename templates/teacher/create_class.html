{% extends "base.html" %}

{% block title %}Create Class{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Create New Class</h1>
    
    <form method="POST" class="standard-form">
        <div class="form-group">
            <label for="name">Class Name:</label>
            <input type="text" id="name" name="name" required placeholder="e.g., Physics 101 - Fall 2026">
        </div>
        
        <div class="button-group">
            <button type="submit" class="btn btn-primary">Create Class</button>
            <a href="{{ url_for('teacher_dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
    
    <div class="info-box">
        <p><strong>Note:</strong> A unique 6-character join code will be automatically generated for your class.</p>
    </div>
</div>
{% endblock %}
