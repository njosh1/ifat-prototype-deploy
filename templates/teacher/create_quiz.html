{% extends "base.html" %}

{% block title %}Create Quiz{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Create New Quiz for {{ class_obj.name }}</h1>
    
    <form method="POST" class="standard-form">
        <div class="form-group">
            <label for="title">Quiz Title:</label>
            <input type="text" id="title" name="title" required placeholder="e.g., Chapter 5: Forces and Motion">
        </div>
        
        <div class="button-group">
            <button type="submit" class="btn btn-primary">Create Quiz</button>
            <a href="{{ url_for('view_class', class_id=class_obj.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
    
    <div class="info-box">
        <p><strong>Note:</strong> After creating the quiz, you'll be able to add questions. A unique join code will be generated automatically.</p>
    </div>
</div>
{% endblock %}
